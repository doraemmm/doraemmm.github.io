<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喜樂 × 平安 健康日誌</title>

<style>
  :root {
    --cream:#f5f0e8; --warm-white:#faf7f2; --ink:#1a1410; --ink-light:#3d3228;
    --xile-color:#c17b4a; --xile-pale:#f0dfc8; --xile-deep:#8b4f1f;
    --ping-color:#5b8fa8; --ping-pale:#cce0ec; --ping-deep:#2d607a;
    --accent-red:#c44b3a; --accent-green:#4a8c5c; --accent-warn:#c47a1a;
    --border:#d4c9b5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body, button, input, select, textarea, h1, h2, h3 { font-family: '微軟正黑體', sans-serif !important; }
  body{background:var(--cream);color:var(--ink);font-weight:700;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

  /* ─── HEADER ─── */
  header{padding:40px 48px 32px; border-bottom:1px solid var(--border); text-align:center}
  .title-block h1{font-size:clamp(2rem,6vw,4rem); font-weight:900}
  .title-block .subtitle{margin-top:10px; font-size:1rem; color:var(--ink-light); letter-spacing:.1em}

  /* ─── DASHBOARD ─── */
  .dashboard{max-width:1100px; margin:32px auto 0; padding:0 48px}
  .dashboard-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px}
  .dash-cat{border:2px solid var(--border); border-radius:12px; overflow:hidden; background:var(--warm-white); transition:transform .2s}
  .dash-cat:hover{transform:translateY(-2px)}
  .dash-cat-header{padding:20px; text-align:center; cursor:pointer; border-bottom:2px solid var(--border)}
  .dash-cat-header.xile{background:var(--xile-pale)}
  .dash-cat-header.ping{background:var(--ping-pale)}
  .dash-cat-name{font-size:1.5rem; font-weight:900}
  .dash-cat-meta{font-size:.85rem; color:var(--ink-light); display:block; margin-top:5px}
  .tap-hint{font-size:.75rem; opacity:.6; display:block; margin-top:8px}

  /* ─── FORM ─── */
  .form-card{background:var(--warm-white); border:2px solid var(--border); border-radius:12px; max-width:1100px; margin:32px auto 0; padding:32px 48px}
  .form-field{margin-bottom:24px}
  .form-field label{display:block; font-size:.95rem; margin-bottom:10px}

  /* 分段選鈕 Segmented Control */
  .seg-control{display:flex; background:var(--cream); border:1px solid var(--border); border-radius:8px; padding:4px; gap:4px; flex-wrap: wrap;}
  .seg-btn{flex:1; border:none; padding:10px; border-radius:6px; background:transparent; cursor:pointer; font-weight:900; color:var(--ink-light); transition:.2s; min-width: 60px;}
  .seg-btn.active{background:var(--ink); color:#fff}

  /* 通用輸入框 */
  input[type="date"], textarea{width:100%; padding:12px; background:var(--cream); border:1px solid var(--border); border-radius:8px; font-weight:700; outline:none}
  textarea{min-height:100px; resize:vertical}

  /* 核取方塊自訂 */
  .check-group{display:flex; gap:20px; flex-wrap:wrap}
  .check-item{display:flex; align-items:center; gap:8px; cursor:pointer}

  /* 送出按鈕 */
  .btn-submit{display:block; width:fit-content; min-width:160px; padding:12px 32px; margin:32px auto 0; border:none; border-radius:8px; font-size:1.1rem; font-weight:900; background:var(--ink); color:#fff; cursor:pointer; transition:opacity .2s}
  .btn-submit:hover{opacity:.8}

  /* ─── HISTORY ─── */
  .section-head{max-width:1100px; margin:48px auto 0; padding:0 48px; display:flex; align-items:center; gap:16px}
  .section-head .line{flex:1; height:1px; background:var(--border)}
  .scroll-wrap{max-width:1100px; margin:24px auto 0; overflow-x:auto; border-radius:12px; border:2px solid var(--border)}
  table{width:100%; border-collapse:collapse; min-width:700px; background:#fff}
  th{background:var(--cream); padding:16px; border-bottom:2px solid var(--border)}
  td{padding:14px; text-align:center; border-bottom:1px solid var(--border)}
  .status-tag{padding:4px 10px; border-radius:4px; font-size:.8rem; font-weight:900}
  .tag-red{background:#fdf0ee; color:var(--accent-red); border:1px solid var(--accent-red)}
  .tag-green{background:#eef6f0; color:var(--accent-green); border:1px solid var(--accent-green)}

  /* ─── PHOTOS ─── */
  .photo-wall{display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; padding:0 48px; max-width:1100px; margin:24px auto 0}
  .photo-item{aspect-ratio:1; border-radius:12px; overflow:hidden; border:2px solid var(--border); cursor:zoom-in}
  .photo-item img{width:100%; height:100%; object-fit:cover; transition:.3s}
  .photo-item img:hover{transform:scale(1.05)}

  /* ─── LIGHTBOX ─── */
  #lightbox{display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:1000; justify-content:center; align-items:center; cursor:zoom-out}
  #lightbox img{max-width:90%; max-height:90%; border-radius:8px; box-shadow:0 0 30px rgba(0,0,0,.5)}

  @media(max-width:768px){
    .dashboard-grid{grid-template-columns:1fr}
    .dashboard, .form-card, .section-head, .photo-wall{padding:0 20px}
    header{padding:30px 20px}
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>喜樂 × 平安</h1>
    <p class="subtitle">奴才專用健康紀錄表</p>
  </div>
</header>

<div class="dashboard">
  <div class="dashboard-grid">
    <div class="dash-cat" onclick="selectCat('xile')">
      <div class="dash-cat-header xile">
        <span class="dash-cat-name">🟠 喜樂</span>
        <span class="dash-cat-meta">10歲 · 母 · 4.65 kg · 脫水注意</span>
        <span class="tap-hint">👉 點此開啟紀錄表</span>
      </div>
    </div>
    <div class="dash-cat" onclick="selectCat('ping')">
      <div class="dash-cat-header ping">
        <span class="dash-cat-name">🔵 平安</span>
        <span class="dash-cat-meta">10歲 · 公 · 5.4 kg · 心臟追蹤</span>
        <span class="tap-hint">👉 點此開啟紀錄表</span>
      </div>
    </div>
  </div>
</div>

<div id="cat-content" style="display:none">
  <div class="form-card" id="form-scroll-target">
    <h3 id="form-title" style="margin-bottom:20px">正在記錄：</h3>
    
    <div class="form-field">
      <label>📅 紀錄日期</label>
      <input type="date" id="date-active">
    </div>

    <div id="xile-fields" style="display:none">
      <div class="form-field">
        <label>🤮 嘔吐次數</label>
        <div class="seg-control" id="vomit-seg-xile">
          <button class="seg-btn active" onclick="setSeg(this, 0)">0 次</button>
          <button class="seg-btn" onclick="setSeg(this, 1)">1 次</button>
          <button class="seg-btn" onclick="setSeg(this, 2)">2 次</button>
        </div>
      </div>
      <div class="form-field">
        <label>🔍 嘔吐物內容</label>
        <div class="seg-control" id="vomit-type-xile">
          <button class="seg-btn active" onclick="setSeg(this, '無')">無</button>
          <button class="seg-btn" onclick="setSeg(this, '飼料')">飼料</button>
          <button class="seg-btn" onclick="setSeg(this, '膽汁')">膽汁</button>
          <button class="seg-btn" onclick="setSeg(this, '毛球')">毛球</button>
        </div>
      </div>
      <div class="form-field">
        <label>💊 今日用藥（預設已吃）</label>
        <div class="check-group">
          <label class="check-item"><input type="checkbox" checked> 腎臟藥</label>
          <label class="check-item"><input type="checkbox" checked> 胰臟藥</label>
        </div>
      </div>
    </div>

    <div id="ping-fields" style="display:none">
      <div class="form-field">
        <label>🗣️ 咳嗽次數</label>
        <div class="seg-control">
          <button class="seg-btn active" onclick="setSeg(this, 0)">0 次</button>
          <button class="seg-btn" onclick="setSeg(this, 1)">1 次</button>
          <button class="seg-btn" onclick="setSeg(this, 2)">2 次以上</button>
        </div>
      </div>
      <div class="form-field">
        <label>🤮 嘔吐次數</label>
        <div class="seg-control">
          <button class="seg-btn active" onclick="setSeg(this, 0)">0 次</button>
          <button class="seg-btn" onclick="setSeg(this, 1)">1 次</button>
        </div>
      </div>
    </div>

    <div class="form-field">
      <label>📝 奴才備註</label>
      <textarea placeholder="主子今天心情如何？有沒有特別反常？"></textarea>
    </div>

    <button class="btn-submit" onclick="submitForm()">✅ 記錄完畢</button>
  </div>

  <div class="section-head"><h2>歷史紀錄</h2><div class="line"></div></div>
  <div class="scroll-wrap">
    <table>
      <thead>
        <tr><th>日期</th><th>狀態</th><th>內容/次數</th><th>備註</th></tr>
      </thead>
      <tbody id="history-tbody">
        </tbody>
    </table>
  </div>

  <div class="section-head"><h2>最新寫真</h2><div class="line"></div></div>
  <div class="photo-wall" id="photo-wall">
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img"></div>
<div style="height:60px"></div>

<script>
  // 初始化日期
  document.getElementById('date-active').value = new Date().toISOString().split('T')[0];

  function setSeg(btn, val) {
    const parent = btn.parentElement;
    parent.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function selectCat(cat) {
    const title = cat === 'xile' ? '🟠 喜樂' : '🔵 平安';
    document.getElementById('form-title').innerText = '正在記錄：' + title;
    document.getElementById('cat-content').style.display = 'block';
    document.getElementById('xile-fields').style.display = cat === 'xile' ? 'block' : 'none';
    document.getElementById('ping-fields').style.display = cat === 'ping' ? 'block' : 'none';
    
    // 平滑捲動
    document.getElementById('form-scroll-target').scrollIntoView({behavior:'smooth'});
    
    // 模擬歷史紀錄
    const tbody = document.getElementById('history-tbody');
    tbody.innerHTML = `
      <tr>
        <td>05/05</td>
        <td><span class="status-tag tag-green">正常</span></td>
        <td>無嘔吐 / 已用藥</td>
        <td>胃口很好</td>
      </tr>
    `;

    // 模擬照片牆
    const wall = document.getElementById('photo-wall');
    wall.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;">📷 這裡會顯示主子的最新照片...</div>';
  }

  function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = src;
    lb.style.display = 'flex';
  }

  function submitForm() {
    alert('主子紀錄已存檔，辛苦了奴才！');
  }
</script>

</body>
</html>
