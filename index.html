<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喜樂 × 平安 健康日誌</title>

<!-- Favicon 4大天王連線 -->
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<style>
  :root {
    --cream:#f5f0e8; --warm-white:#faf7f2; --ink:#1a1410; --ink-light:#3d3228;
    --xile-color:#c17b4a; --xile-pale:#f0dfc8; --xile-deep:#8b4f1f;
    --ping-color:#5b8fa8; --ping-pale:#cce0ec; --ping-deep:#2d607a;
    --accent-red:#c44b3a; --accent-green:#4a8c5c; --border:#d4c9b5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body, button, input, select, textarea, h1, h2, h3, .sel-btn, .selector-label, .subtitle, a {
    font-family: '微軟正黑體', 'Microsoft JhengHei', sans-serif !important;
  }
  body{background:var(--cream);color:var(--ink);font-weight:700;min-height:100vh;overflow-x:hidden}
  header{padding:60px 48px 40px;border-bottom:1px solid var(--border);animation:fadeUp .5s ease both}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
  .title-block h1{font-size:clamp(2.5rem,6vw,4rem);line-height:.95;letter-spacing:-.02em;font-weight:900}
  .title-block h1 em{font-style:italic;color:var(--xile-color)}
  .title-block .subtitle{margin-top:12px;font-size:1rem;letter-spacing:.1em;color:var(--ink-light)}
  .section-head{max-width:1100px;margin:48px auto 0;padding:0 48px;display:flex;align-items:center;gap:16px}
  .section-head h2{font-size:1.5rem;font-weight:900}
  .section-head .line{flex:1;height:1px;background:var(--border)}
  .selector-wrap{max-width:1100px;margin:28px auto 0;padding:0 48px}
  .selector-inner{display:flex;align-items:center;gap:20px;background:var(--warm-white);border:1px solid var(--border);border-radius:4px;padding:20px 28px}
  .selector-label{font-size:.9rem;font-weight:900;letter-spacing:.1em;color:var(--ink-light);white-space:nowrap}
  .selector-options{display:flex;gap:10px;flex-wrap:wrap}
  .sel-btn{padding:10px 28px;border:1.5px solid var(--border);border-radius:3px;background:var(--cream);font-size:.9rem;font-weight:900;cursor:pointer;transition:all .2s}
  .sel-btn.active{background:var(--warm-white);border-color:var(--ink)}
  .cat-content-visible{display:block;max-width:1100px;margin:32px auto 0;padding:0 48px;animation:fadeUp .35s ease both}
  .form-card{background:var(--warm-white);border:2px solid var(--border);border-radius:8px;padding:28px}
  .form-field label{display:block;font-size:.9rem;font-weight:900;margin-bottom:6px}
  .form-field input:not([type="checkbox"]),.form-field select,.form-field textarea{
    width:100%;padding:9px 12px;background:var(--cream);border:1px solid var(--border);border-radius:4px;font-size:.9rem;font-weight:700;outline:none}
  .btn-submit{width:100%;padding:12px;margin-top:8px;border:none;border-radius:4px;font-size:1rem;font-weight:900;cursor:pointer;color:#fff;background:var(--ink)}
  .scroll-wrap{max-height: 400px; overflow-y: auto; border: 2px solid var(--border); border-radius: 8px; background: var(--warm-white); position: relative;}
  table{width:100%;border-collapse:separate; border-spacing: 0; font-size:.9rem; min-width:640px}
  thead th{position: sticky; top: 0; z-index: 10; background: #e6e0d3; padding:12px 14px;text-align:center;box-shadow: 0 2px 0 var(--border);}
  tbody td { border-bottom:1px solid rgba(0,0,0,.05); padding:10px 14px; text-align:center; }
  .show-all-btn { display: block; width: 100%; padding: 12px; margin-top: 12px; background: var(--warm-white); border: 2px dashed var(--border); border-radius:8px; cursor: pointer; font-weight: 900;}
  .photo-wall { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-top: 20px; }
  .photo-link-block { aspect-ratio: 1; border-radius: 12px; border: 3px dashed var(--border); cursor: pointer; overflow: hidden; transition: 0.3s; }
  .photo-link-block:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>喜樂 × 平安</h1>
      <p class="subtitle">寵物健康日誌</p>
    </div>
  </div>
</header>

<div class="selector-wrap">
  <div class="selector-inner">
    <span class="selector-label">選擇寵物</span>
    <div class="selector-options">
      <button class="sel-btn" id="sel-xile" onclick="selectCat('xile')">🟠 喜樂</button>
      <button class="sel-btn" id="sel-ping" onclick="selectCat('ping')">🔵 平安</button>
    </div>
  </div>
</div>

<div id="cat-content" style="display:none">
  <div class="form-card" id="dynamic-form-card">
    <h3 id="form-title">今日紀錄</h3>
    <div class="form-field"><label>日期</label><input type="date" id="date-active"></div>

    <div id="xile-fields" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-field"><label>嘔吐次數</label><select id="vomit-count-xile"><option value="0">0 次</option><option value="1">1 次</option><option value="2">2 次</option></select></div>
        <div class="form-field"><label>嘔吐物</label><select id="vomit-type-xile"><option value="">— 選擇 —</option><option>飼料</option><option>膽汁</option><option>毛球</option></select></div>
      </div>
      <div class="form-field">
        <label>今日用藥</label>
        <div style="display:flex;gap:20px">
          <label style="cursor:pointer"><input type="checkbox" id="kidney-drug" checked> 腎臟藥</label>
          <label style="cursor:pointer"><input type="checkbox" id="pancreas-drug" checked> 胰臟藥</label>
        </div>
      </div>
    </div>

    <div id="ping-fields" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-field"><label>咳嗽次數</label><select id="cough-count-ping"><option value="0">0 次</option><option value="1">1 次</option><option value="2">2 次</option></select></div>
        <div class="form-field"><label>嘔吐次數</label><select id="vomit-count-ping"><option value="0">0 次</option><option value="1">1 次</option></select></div>
      </div>
    </div>

    <div class="form-field">
      <label>其他事項</label>
      <div style="display:flex;gap:20px">
        <label style="cursor:pointer"><input type="checkbox" id="nail-cut"> 剪趾甲</label>
        <label style="cursor:pointer"><input type="checkbox" id="vaccine"> 施打疫苗</label>
      </div>
    </div>
    <div class="form-field"><label>備註</label><textarea id="note-text" placeholder="補充說明..."></textarea></div>
    <button class="btn-submit" id="submit-btn" onclick="submitForm()">送出紀錄</button>
  </div>

  <div class="section-head"><h2>歷史紀錄</h2><div class="line"></div></div>
  <div class="log-container">
    <div class="scroll-wrap">
      <table><thead id="history-thead"></thead><tbody id="history-tbody"></tbody></table>
    </div>
    <button id="show-all-btn" class="show-all-btn" onclick="toggleAllRecords()" style="display:none;">顯示全部紀錄 ↓</button>
  </div>

  <div class="section-head"><h2>最新照片</h2><div class="line"></div></div>
  <div class="photo-wall" id="photo-wall-container"></div>
</div>

<script>
document.getElementById('date-active').value = new Date().toISOString().split('T')[0];
const API_KEY = 'AIzaSyBqKEybNiIj625YahYIufEgWEQyiIpiH5E';
const folderIds = { xile: "1egON9b5hDQYqfnRRihuf5FYRSV4IFbnK", ping: "1n6GjR4i4hIS8VmCnjXUyP1EHF1qTUMRO" };
const csvUrls = {
  xile: "https://docs.google.com/spreadsheets/d/14MHtM51PP5x5EK-0dfWCE3zVOuWC3-cg-HsfL3kncXY/export?format=csv&gid=1731637259",
  ping: "https://docs.google.com/spreadsheets/d/14MHtM51PP5x5EK-0dfWCE3zVOuWC3-cg-HsfL3kncXY/export?format=csv&gid=1573452397"
};

let currentCat = null, allCatRecords = [], showFullHistory = false;

function selectCat(cat) {
  currentCat = cat; showFullHistory = false;
  document.querySelectorAll('.sel-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('sel-' + cat).classList.add('active');
  document.getElementById('cat-content').style.display = 'block';
  document.getElementById('xile-fields').style.display = cat === 'xile' ? 'block' : 'none';
  document.getElementById('ping-fields').style.display = cat === 'ping' ? 'block' : 'none';
  fetchSheetData(cat); renderPhotoWall(cat);
}

async function fetchSheetData(cat) {
  const tbody = document.getElementById('history-tbody');
  tbody.innerHTML = `<tr><td colspan="6" style="padding:40px;">⏳ 正在連線中...</td></tr>`;
  try {
    const res = await fetch(csvUrls[cat]);
    const csv = await res.text();
    const rows = csv.split('\n').map(r => r.trim()).filter(r => r);
    allCatRecords = rows.slice(1).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim())).filter(c => c[0]);
    allCatRecords.reverse(); renderHistoryTable();
  } catch (e) { tbody.innerHTML = `<tr><td colspan="6">讀取失敗</td></tr>`; }
}

// 👉 核心邏輯修正：0、空白、字串0 都顯示為 —
function rc(val, type) {
  const isZero = !val || val === "0" || val === " " || val === "";
  if (type === 'check') return val === 'TRUE' ? '✅' : '—';
  if (type === 'nail') return val === 'TRUE' ? '✂️' : '—';
  if (isZero) return '—';
  return val + '次';
}

function renderHistoryTable() {
  const tbody = document.getElementById('history-tbody');
  const thead = document.getElementById('history-thead');
  const displayData = showFullHistory ? allCatRecords : allCatRecords.slice(0, 10);
  tbody.innerHTML = '';
  if (currentCat === 'xile') {
    thead.innerHTML = '<tr><th>日期</th><th>腎</th><th>胰</th><th>嘔吐</th><th>內容</th><th>剪甲</th></tr>';
    displayData.forEach(r => tbody.innerHTML += `<tr><td>${r[0]}</td><td>${rc(r[1],'check')}</td><td>${rc(r[2],'check')}</td><td>${rc(r[3],'count')}</td><td>${r[4]||'—'}</td><td>${rc(r[5],'nail')}</td></tr>`);
  } else {
    thead.innerHTML = '<tr><th>日期</th><th>咳嗽</th><th>嘔吐</th><th>內容</th><th>剪甲</th></tr>';
    displayData.forEach(r => tbody.innerHTML += `<tr><td>${r[0]}</td><td>${rc(r[1],'count')}</td><td>${rc(r[2],'count')}</td><td>${r[3]||'—'}</td><td>${rc(r[4],'nail')}</td></tr>`);
  }
  document.getElementById('show-all-btn').style.display = allCatRecords.length > 10 ? 'block' : 'none';
  document.getElementById('show-all-btn').textContent = showFullHistory ? '收合紀錄 ↑' : `顯示全部 (${allCatRecords.length}) ↓`;
}

function toggleAllRecords() { showFullHistory = !showFullHistory; renderHistoryTable(); }

async function renderPhotoWall(cat) {
  const container = document.getElementById('photo-wall-container');
  container.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 40px;">🐈 正在抓貓中...</div>`;
  const q = `'${folderIds[cat]}' in parents and mimeType contains 'image/' and trashed = false`;
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&key=${API_KEY}&fields=files(id,name)&orderBy=createdTime%20desc&pageSize=5`;
  try {
    const res = await fetch(url); const data = await res.json();
    container.innerHTML = data.files.map(f => `<div class="photo-link-block" onclick="window.open('https://drive.google.com/file/d/${f.id}/view', '_blank')"><img src="https://drive.google.com/thumbnail?id=${f.id}&sz=w500" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`).join('');
  } catch (e) { container.innerHTML = `<div>載入失敗</div>`; }
}

async function submitForm() {
  const btn = document.getElementById('submit-btn'); btn.disabled = true; btn.textContent = '寫入中...';
  await new Promise(r => setTimeout(r, 1500)); 
  btn.textContent = '✅ 已通知同步';
  fetchSheetData(currentCat);
  setTimeout(() => { btn.disabled = false; btn.textContent = '送出紀錄'; }, 2000);
}
</script>
</body>
</html>
