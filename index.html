<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寵物健康日誌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .cat-tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }

        .cat-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            background: transparent;
            font-size: 16px;
        }

        .cat-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .cat-tab:hover {
            background: #fafafa;
        }

        .page-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .page-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            background: white;
            font-size: 14px;
            color: #666;
        }

        .page-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .page-tab:hover {
            background: #f9f9f9;
        }

        .content {
            padding: 30px 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .form-group input[type="date"],
        .form-group input[type="number"],
        .form-group input[type="password"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input[type="date"]:focus,
        .form-group input[type="number"]:focus,
        .form-group input[type="password"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-right: 8px;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
            font-size: 14px;
        }

        .counter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .counter-button {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-button:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .counter-display {
            width: 60px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #eee;
        }

        /* 歷史紀錄相關樣式 */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #f5f5f5;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        tbody tr:nth-child(even):hover {
            background: #f5f5f5;
        }

        /* 粘性日期列 */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            background-color: white;
            box-shadow: 1px 0 3px rgba(0,0,0,0.1);
        }

        thead th:first-child {
            background-color: #f5f5f5;
            z-index: 11;
        }

        tbody tr:nth-child(even) td:first-child {
            background-color: #fafafa;
        }

        tbody tr:hover td:first-child {
            background-color: #f5f5f5;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐱 寵物健康日誌</h1>
        </div>

        <div class="cat-tabs">
            <button class="cat-tab active" data-cat="xile">喜樂 🧡</button>
            <button class="cat-tab" data-cat="ping">平安 💙</button>
        </div>

        <div class="page-tabs">
            <button class="page-tab active" data-page="today">今日紀錄</button>
            <button class="page-tab" data-page="history">歷史紀錄</button>
        </div>

        <div class="content">
            <!-- 喜樂 - 今日紀錄 -->
            <div class="page active" id="xile-today">
                <h2 style="margin-bottom: 20px;">今日紀錄 - 喜樂</h2>
                <div id="xile-message" class="message"></div>

                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="xile-date" />
                </div>

                <div class="form-group">
                    <label>腎臟藥</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="xile-kidney-drug" />
                            <label for="xile-kidney-drug">已服用</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>胰臟藥</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="xile-pancreas-drug" />
                            <label for="xile-pancreas-drug">已服用</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>嘔吐次數</label>
                    <div class="counter-group">
                        <button class="counter-button" onclick="decrementCounter('xile-vomit-count')">−</button>
                        <div class="counter-display" id="xile-vomit-count">0</div>
                        <button class="counter-button" onclick="incrementCounter('xile-vomit-count')">+</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>嘔吐物（可複選）</label>
                    <select id="xile-vomit-type">
                        <option value="">請選擇</option>
                        <option value="毛球">毛球</option>
                        <option value="飼料">飼料</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>修剪指甲</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="xile-nail-cut" />
                            <label for="xile-nail-cut">已修剪</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>施打疫苗</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="xile-vaccine" />
                            <label for="xile-vaccine">已施打</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>備註</label>
                    <textarea id="xile-note" placeholder="補充說明..."></textarea>
                </div>

                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="xile-password" placeholder="請輸入密碼" />
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="submitForm('xile')">🚀 送出紀錄</button>
                    <button class="btn btn-secondary" onclick="resetForm('xile')">重置</button>
                </div>
            </div>

            <!-- 平安 - 今日紀錄 -->
            <div class="page" id="ping-today">
                <h2 style="margin-bottom: 20px;">今日紀錄 - 平安</h2>
                <div id="ping-message" class="message"></div>

                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="ping-date" />
                </div>

                <div class="form-group">
                    <label>心臟藥</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="ping-heart-drug" />
                            <label for="ping-heart-drug">已服用</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>咳嗽次數</label>
                    <div class="counter-group">
                        <button class="counter-button" onclick="decrementCounter('ping-cough-count')">−</button>
                        <div class="counter-display" id="ping-cough-count">0</div>
                        <button class="counter-button" onclick="incrementCounter('ping-cough-count')">+</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>嘔吐次數</label>
                    <div class="counter-group">
                        <button class="counter-button" onclick="decrementCounter('ping-vomit-count')">−</button>
                        <div class="counter-display" id="ping-vomit-count">0</div>
                        <button class="counter-button" onclick="incrementCounter('ping-vomit-count')">+</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>嘔吐物（可複選）</label>
                    <select id="ping-vomit-type">
                        <option value="">請選擇</option>
                        <option value="毛球">毛球</option>
                        <option value="飼料">飼料</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>修剪指甲</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="ping-nail-cut" />
                            <label for="ping-nail-cut">已修剪</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>備註</label>
                    <textarea id="ping-note" placeholder="補充說明..."></textarea>
                </div>

                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="ping-password" placeholder="請輸入密碼" />
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="submitForm('ping')">🚀 送出紀錄</button>
                    <button class="btn btn-secondary" onclick="resetForm('ping')">重置</button>
                </div>
            </div>

            <!-- 喜樂 - 歷史紀錄 -->
            <div class="page" id="xile-history">
                <h2 style="margin-bottom: 20px;">歷史紀錄 - 喜樂</h2>
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterHistory('xile', 'all')">全部紀錄</button>
                    <button class="filter-btn" onclick="filterHistory('xile', 'vomit')">嘔吐</button>
                    <button class="filter-btn" onclick="filterHistory('xile', 'kidney')">腎臟藥</button>
                    <button class="filter-btn" onclick="filterHistory('xile', 'pancreas')">胰臟藥</button>
                    <button class="filter-btn" onclick="filterHistory('xile', 'nail')">指甲修剪</button>
                    <button class="filter-btn" onclick="filterHistory('xile', 'vaccine')">疫苗</button>
                </div>
                <div class="table-wrapper">
                    <table id="xile-history-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>腎臟藥</th>
                                <th>胰臟藥</th>
                                <th>嘔吐次數</th>
                                <th>嘔吐物</th>
                                <th>修剪指甲</th>
                                <th>疫苗</th>
                                <th>備註</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- 平安 - 歷史紀錄 -->
            <div class="page" id="ping-history">
                <h2 style="margin-bottom: 20px;">歷史紀錄 - 平安</h2>
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterHistory('ping', 'all')">全部紀錄</button>
                    <button class="filter-btn" onclick="filterHistory('ping', 'heart')">心臟藥</button>
                    <button class="filter-btn" onclick="filterHistory('ping', 'cough')">咳嗽</button>
                    <button class="filter-btn" onclick="filterHistory('ping', 'vomit')">嘔吐</button>
                    <button class="filter-btn" onclick="filterHistory('ping', 'nail')">指甲修剪</button>
                </div>
                <div class="table-wrapper">
                    <table id="ping-history-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>心臟藥</th>
                                <th>咳嗽次數</th>
                                <th>嘔吐次數</th>
                                <th>嘔吐物</th>
                                <th>修剪指甲</th>
                                <th>備註</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxRfPaF8WQ3bIyqDP4iaXRr7DJe4ZUEA6zGt67xw3Es1iEJuBbFWHaraZovKHymKkVbjw/exec';
        let currentCat = 'xile';
        let currentPage = 'today';
        let historyData = { xile: [], ping: [] };
        let filters = { xile: 'all', ping: 'all' };

        // 初始化日期為今天
        document.addEventListener('DOMContentLoaded', function() {
            setTodayDate('xile');
            setTodayDate('ping');
            loadHistoryFromLocalStorage();
        });

        // 分頁和貓咪切換
        document.querySelectorAll('.cat-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                currentCat = this.dataset.cat;
                document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                updatePageDisplay();
            });
        });

        document.querySelectorAll('.page-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                currentPage = this.dataset.page;
                document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                updatePageDisplay();
            });
        });

        function updatePageDisplay() {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            const pageId = `${currentCat}-${currentPage}`;
            document.getElementById(pageId).classList.add('active');
        }

        function setTodayDate(cat) {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById(`${cat}-date`).value = today;
        }

        function incrementCounter(id) {
            const element = document.getElementById(id);
            element.textContent = parseInt(element.textContent) + 1;
        }

        function decrementCounter(id) {
            const element = document.getElementById(id);
            const current = parseInt(element.textContent);
            if (current > 0) {
                element.textContent = current - 1;
            }
        }

        async function submitForm(cat) {
            const date = document.getElementById(`${cat}-date`).value;
            const password = document.getElementById(`${cat}-password`).value;

            if (!date || !password) {
                showMessage(cat, '請填入日期和密碼', 'error');
                return;
            }

            let data = {
                cat: cat,
                date: date,
                password: password,
                note: document.getElementById(`${cat}-note`).value || ''
            };

            if (cat === 'xile') {
                data.kidneyDrug = document.getElementById('xile-kidney-drug').checked;
                data.pancreasDrug = document.getElementById('xile-pancreas-drug').checked;
                data.vomitCount = parseInt(document.getElementById('xile-vomit-count').textContent);
                data.vomitType = document.getElementById('xile-vomit-type').value;
                data.nailCut = document.getElementById('xile-nail-cut').checked;
                data.vaccine = document.getElementById('xile-vaccine').checked;
            } else {
                data.heartDrug = document.getElementById('ping-heart-drug').checked;
                data.coughCount = parseInt(document.getElementById('ping-cough-count').textContent);
                data.vomitCount = parseInt(document.getElementById('ping-vomit-count').textContent);
                data.vomitType = document.getElementById('ping-vomit-type').value;
                data.nailCut = document.getElementById('ping-nail-cut').checked;
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.ok) {
                    showMessage(cat, '✅ 紀錄已成功送出！', 'success');
                    addToLocalHistory(cat, data);
                    resetForm(cat);
                    setTimeout(() => showMessage(cat, '', ''), 3000);
                } else {
                    showMessage(cat, `❌ 錯誤：${result.msg}`, 'error');
                }
            } catch (error) {
                showMessage(cat, `❌ 送出失敗：${error.message}`, 'error');
                // 本地備份
                addToLocalHistory(cat, data);
            }
        }

        function resetForm(cat) {
            setTodayDate(cat);
            document.getElementById(`${cat}-password`).value = '';
            document.getElementById(`${cat}-note`).value = '';
            document.querySelectorAll(`#${cat}-today input[type="checkbox"]`).forEach(cb => cb.checked = false);
            document.querySelectorAll(`#${cat}-today select`).forEach(sel => sel.value = '');
            document.getElementById(`${cat}-vomit-count`).textContent = '0';
            if (cat === 'ping') {
                document.getElementById('ping-cough-count').textContent = '0';
            }
        }

        function showMessage(cat, message, type) {
            const messageEl = document.getElementById(`${cat}-message`);
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
        }

        function addToLocalHistory(cat, data) {
            if (!historyData[cat]) historyData[cat] = [];
            historyData[cat].push(data);
            saveHistoryToLocalStorage();
            if (currentPage === 'history' && currentCat === cat) {
                renderHistoryTable(cat);
            }
        }

        function saveHistoryToLocalStorage() {
            localStorage.setItem('petHealthHistory', JSON.stringify(historyData));
        }

        function loadHistoryFromLocalStorage() {
            const stored = localStorage.getItem('petHealthHistory');
            if (stored) {
                historyData = JSON.parse(stored);
            }
        }

        function filterHistory(cat, filter) {
            filters[cat] = filter;
            document.querySelectorAll(`#${cat}-history .filter-btn`).forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderHistoryTable(cat);
        }

        function renderHistoryTable(cat) {
            const table = document.getElementById(`${cat}-history-table`);
            const tbody = table.querySelector('tbody');
            const filter = filters[cat];
            let data = historyData[cat] || [];

            // 過濾資料
            if (filter !== 'all') {
                data = data.filter(record => {
                    if (cat === 'xile') {
                        if (filter === 'vomit') return record.vomitCount > 0;
                        if (filter === 'kidney') return record.kidneyDrug;
                        if (filter === 'pancreas') return record.pancreasDrug;
                        if (filter === 'nail') return record.nailCut;
                        if (filter === 'vaccine') return record.vaccine;
                    } else {
                        if (filter === 'heart') return record.heartDrug;
                        if (filter === 'cough') return record.coughCount > 0;
                        if (filter === 'vomit') return record.vomitCount > 0;
                        if (filter === 'nail') return record.nailCut;
                    }
                });
            }

            // 按日期倒序排列
            data = data.sort((a, b) => new Date(b.date) - new Date(a.date));

            tbody.innerHTML = '';

            if (data.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell();
                cell.colSpan = cat === 'xile' ? 8 : 7;
                cell.style.textAlign = 'center';
                cell.style.color = '#999';
                cell.style.padding = '40px 20px';
                cell.textContent = '尚無紀錄';
                return;
            }

            data.forEach(record => {
                const row = tbody.insertRow();

                if (cat === 'xile') {
                    row.insertCell().textContent = record.date;
                    row.insertCell().textContent = record.kidneyDrug ? '✓' : '-';
                    row.insertCell().textContent = record.pancreasDrug ? '✓' : '-';
                    row.insertCell().textContent = record.vomitCount || '-';
                    row.insertCell().textContent = record.vomitType || '-';
                    row.insertCell().textContent = record.nailCut ? '✓' : '-';
                    row.insertCell().textContent = record.vaccine ? '✓' : '-';
                    row.insertCell().textContent = record.note || '-';
                } else {
                    row.insertCell().textContent = record.date;
                    row.insertCell().textContent = record.heartDrug ? '✓' : '-';
                    row.insertCell().textContent = record.coughCount || '-';
                    row.insertCell().textContent = record.vomitCount || '-';
                    row.insertCell().textContent = record.vomitType || '-';
                    row.insertCell().textContent = record.nailCut ? '✓' : '-';
                    row.insertCell().textContent = record.note || '-';
                }
            });
        }
    </script>
</body>
</html>
