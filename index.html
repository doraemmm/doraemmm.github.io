<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喜樂 × 平安 健康日誌</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#f5f0e8; --warm-white:#faf7f2; --ink:#1a1410; --ink-light:#3d3228;
    --xile-color:#c17b4a; --xile-pale:#f0dfc8; --xile-deep:#8b4f1f;
    --ping-color:#5b8fa8; --ping-pale:#cce0ec; --ping-deep:#2d607a;
    --accent-red:#c44b3a; --accent-green:#4a8c5c; --border:#d4c9b5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--cream);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.4}

  /* HEADER */
  header{padding:60px 48px 40px;border-bottom:1px solid var(--border);animation:fadeUp .5s ease both}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
  .title-block h1{font-family:'DM Serif Display',serif;font-size:clamp(2.8rem,6vw,5rem);line-height:.95;letter-spacing:-.02em}
  .title-block h1 em{font-style:italic;color:var(--xile-color)}
  .title-block .subtitle{margin-top:12px;font-size:.85rem;letter-spacing:.12em;color:var(--ink-light);text-transform:uppercase}
  .header-meta{text-align:right;font-size:.78rem;color:var(--ink-light);line-height:1.8}

  /* STATS */
  .stats-row{max-width:1100px;margin:48px auto 0;padding:0 48px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .stat-card{background:var(--warm-white);border:1px solid var(--border);border-radius:4px;padding:20px 22px}
  .stat-card .num{font-family:'DM Serif Display',serif;font-size:2.4rem;line-height:1}
  .stat-card .stat-label{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);margin-top:4px}
  .stat-card .stat-sub{font-size:.7rem;color:var(--xile-color);margin-top:2px}

  /* PROFILES */
  .profiles{max-width:1100px;margin:48px auto;padding:0 48px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .profile-card{border-radius:4px;padding:32px;position:relative;overflow:hidden}
  .profile-card.xile{background:var(--xile-pale);border:1px solid #d9b894}
  .profile-card.ping{background:var(--ping-pale);border:1px solid #93c1d8}
  .profile-card::before{content:attr(data-name);position:absolute;right:-12px;top:-8px;font-family:'DM Serif Display',serif;font-size:7rem;line-height:1;opacity:.06;pointer-events:none}
  .profile-name{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1;margin-bottom:4px}
  .xile .profile-name{color:var(--xile-deep)} .ping .profile-name{color:var(--ping-deep)}
  .profile-meta{font-size:.8rem;letter-spacing:.08em;color:var(--ink-light);margin-bottom:20px}
  .profile-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .tag{padding:4px 12px;border-radius:2px;font-size:.73rem;font-weight:700;letter-spacing:.06em}
  .tag-warn{background:#f5ddd6;color:var(--accent-red);border:1px solid #e8b8ac}
  .tag-ok{background:#d6eadc;color:var(--accent-green);border:1px solid #a8d4b4}
  .tag-info{background:#e8e2d4;color:var(--ink-light);border:1px solid var(--border)}
  .profile-note{font-size:.8rem;line-height:1.7;color:var(--ink-light);border-top:1px solid rgba(0,0,0,.08);padding-top:14px;margin-top:14px}

  /* SECTION HEAD */
  .section-head{max-width:1100px;margin:48px auto 0;padding:0 48px;display:flex;align-items:center;gap:16px}
  .section-head h2{font-family:'DM Serif Display',serif;font-size:1.5rem;font-weight:400}
  .section-head .line{flex:1;height:1px;background:var(--border)}
  .section-head .badge{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);background:var(--warm-white);border:1px solid var(--border);padding:4px 10px;border-radius:2px}

  /* SELECTOR */
  .selector-wrap{max-width:1100px;margin:28px auto 0;padding:0 48px}
  .selector-inner{display:flex;align-items:center;gap:20px;background:var(--warm-white);border:1px solid var(--border);border-radius:4px;padding:20px 28px}
  .selector-label{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);white-space:nowrap}
  .selector-options{display:flex;gap:10px;flex-wrap:wrap}
  .sel-btn{padding:10px 28px;border:1.5px solid var(--border);border-radius:3px;background:var(--cream);font-family:'Zen Kaku Gothic New',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.05em;color:var(--ink-light);cursor:pointer;transition:all .2s}
  .sel-btn:disabled{opacity:.35;cursor:default}
  .sel-btn.sel-xile:hover,.sel-btn.sel-xile.active{background:var(--xile-pale);border-color:var(--xile-color);color:var(--xile-deep)}
  .sel-btn.sel-ping:hover,.sel-btn.sel-ping.active{background:var(--ping-pale);border-color:var(--ping-color);color:var(--ping-deep)}

  /* FORM */
  .cat-content-hidden{display:none}
  .cat-content-visible{display:block;max-width:1100px;margin:32px auto 0;padding:0 48px;animation:fadeUp .35s ease both}
  .form-card{background:var(--warm-white);border:1px solid var(--border);border-radius:4px;padding:28px}
  .form-card h3{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink);margin-bottom:20px;display:flex;align-items:center;gap:10px}
  .accent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .form-field{margin-bottom:16px}
  .form-field label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:6px}
  .form-field input:not([type="checkbox"]),.form-field select,.form-field textarea{
    width:100%;padding:9px 12px;background:var(--cream);border:1px solid var(--border);
    border-radius:2px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.82rem;color:var(--ink);
    outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
  .form-field textarea{resize:vertical;min-height:64px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .check-row{display:flex;gap:20px;flex-wrap:wrap}
  .check-item{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-light);cursor:pointer}
  .check-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--xile-color)}
  .btn-submit{width:100%;padding:11px;margin-top:8px;border:none;border-radius:2px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;color:#fff}

  /* LOG TABLE */
  .log-container{margin-top:20px}
  .cat-log-label{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid}
  .scroll-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px;background:var(--warm-white)}
  table{width:100%;border-collapse:collapse;font-size:.8rem;min-width:640px}
  thead tr{border-bottom:2px solid var(--border)}
  thead th{padding:10px 14px;text-align:center;font-weight:700;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);white-space:nowrap}
  tbody tr{border-bottom:1px solid rgba(0,0,0,.04)}
  td{padding:9px 14px;text-align:center;color:var(--ink-light)}
  .pill{display:inline-block;padding:2px 8px;border-radius:2px;font-size:.7rem;font-weight:700}
  .pill-yes{background:#d6eadc;color:#2d6b3f} .pill-no{background:#eee9e0;color:#9a9080}
  .pill-vomit{background:#f5ddd6;color:#8b2d1f} .pill-cough{background:#e8dff5;color:#5b3a8b}
  
  /* 顯示全部按鈕 */
  .show-all-btn {
    display: block; width: 100%; padding: 12px; margin-top: 12px;
    background: var(--warm-white); border: 1px dashed var(--border);
    color: var(--ink-light); font-size: .8rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }
  .show-all-btn:hover { background: var(--border); color: var(--ink); }

  /* 顏色主題控製 */
  .form-card.xile { border-color: var(--xile-color); }
  .form-card.ping { border-color: var(--ping-color); }
  .xile .btn-submit { background: var(--xile-color); }
  .ping .btn-submit { background: var(--ping-color); }
  #history-label.xile { border-color: var(--xile-color); }
  #history-label.ping { border-color: var(--ping-color); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1><em>喜樂</em> × 平安</h1>
      <p class="subtitle">寵物健康日誌 · Pet Health Record</p>
    </div>
  </div>
</header>

<div class="selector-wrap">
  <div class="selector-inner">
    <span class="selector-label">選擇寵物</span>
    <div class="selector-options">
      <button class="sel-btn sel-xile" id="sel-xile" onclick="selectCat('xile')">🟠 喜樂</button>
      <button class="sel-btn sel-ping" id="sel-ping" onclick="selectCat('ping')">🔵 平安</button>
    </div>
  </div>
</div>

<div id="cat-content" class="cat-content-hidden">
  <div class="form-card" id="dynamic-form-card">
    <h3 id="form-title">今日紀錄</h3>
    <div class="form-field"><label>日期</label><input type="date" id="date-active"></div>

    <div id="xile-fields" style="display:none">
      <div class="form-row">
        <div class="form-field"><label>嘔吐次數</label><select id="vomit-count-xile"><option value="0">0 次</option><option value="1">1 次</option><option value="2">2 次</option></select></div>
        <div class="form-field"><label>嘔吐物</label><select id="vomit-type-xile"><option value="">— 選擇 —</option><option>飼料</option><option>膽汁</option><option>毛球</option></select></div>
      </div>
      <div class="form-field">
        <label>今日用藥</label>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" id="kidney-drug" checked> 腎臟藥</label>
          <label class="check-item"><input type="checkbox" id="pancreas-drug" checked> 胰臟藥</label>
        </div>
      </div>
    </div>

    <div id="ping-fields" style="display:none">
      <div class="form-row">
        <div class="form-field"><label>咳嗽次數</label><select id="cough-count-ping"><option value="0">0 次</option><option value="1">1 次</option><option value="2">2 次</option></select></div>
        <div class="form-field"><label>嘔吐次數</label><select id="vomit-count-ping"><option value="0">0 次</option><option value="1">1 次</option></select></div>
      </div>
    </div>

    <div class="form-field">
      <label>其他事項</label>
      <div class="check-row">
        <label class="check-item"><input type="checkbox" id="nail-cut"> 剪趾甲</label>
        <label class="check-item"><input type="checkbox" id="vaccine"> 施打疫苗</label>
      </div>
    </div>
    <div class="form-field"><label>備註</label><textarea id="note-text" placeholder="補充說明..."></textarea></div>
    <button class="btn-submit" id="submit-btn" onclick="submitForm()">送出紀錄並同步</button>
  </div>

  <div class="section-head"><h2>歷史紀錄</h2><div class="line"></div></div>
  <div class="log-container">
    <div class="cat-log-label" id="history-label"><span>健康列表</span></div>
    <div class="scroll-wrap">
      <table><thead id="history-thead"></thead><tbody id="history-tbody"></tbody></table>
    </div>
    <button id="show-all-btn" class="show-all-btn" onclick="toggleAllRecords()">顯示全部紀錄 ↓</button>
  </div>
</div>

<script>
document.getElementById('date-active').value = new Date().toISOString().split('T')[0];

let xileData = [
  ["05/01","✓","✓","1","罐頭","",""],["04/29","✓","✓","1","罐頭","",""],["04/25","✓","✓","1","飼料","",""],
  ["04/20","✓","✓","1","罐頭","",""],["04/19","✓","✓","2","罐頭","",""],["04/18","✓","✓","1","罐頭","",""],
  ["04/17","✓","✓","1","飼料","",""],["04/15","✓","✓","1","罐頭","",""],["04/10","✓","✓","","","✓",""],
  ["04/03","✓","✓","1","罐頭","",""],["03/27","✓","✓","2","透明液體","",""]
];
let pingData = [
  ["05/01","1","","","",""],["04/23","1","","","",""],["04/16","1","","","",""],
  ["04/13","","1","飼料","",""],["04/11","","1","飼料","",""],["04/10","","","","✓",""],
  ["04/03","","1","飼料","",""],["03/30","1","1","飼料","",""],["03/01","1","","","",""],
  ["02/27","1","","","",""],["02/26","1","","","",""]
];

let currentCat = null;
let showFullHistory = false;

function selectCat(cat) {
  currentCat = cat;
  showFullHistory = false;
  document.getElementById('cat-content').className = 'cat-content-visible';
  document.getElementById('dynamic-form-card').className = 'form-card ' + cat;
  document.getElementById('xile-fields').style.display = cat === 'xile' ? 'block' : 'none';
  document.getElementById('ping-fields').style.display = cat === 'ping' ? 'block' : 'none';
  document.getElementById('history-label').className = 'cat-log-label ' + cat;
  renderHistory();
}

function rc(val, type) {
  if (!val || val === "FALSE") return '<span style="color:#ccc">—</span>';
  if (type === 'check') return val === '✓' || val === "TRUE" ? '<span class="pill pill-yes">✓</span>' : '<span style="color:#ccc">—</span>';
  if (type === 'vomit') return '<span class="pill pill-vomit">' + val + '次</span>';
  if (type === 'cough') return '<span class="pill pill-cough">' + val + '次</span>';
  return val;
}

function renderHistory() {
  const tbody = document.getElementById('history-tbody');
  const thead = document.getElementById('history-thead');
  const data = currentCat === 'xile' ? xileData : pingData;
  const displayData = showFullHistory ? data : data.slice(0, 10);
  
  tbody.innerHTML = '';
  if (currentCat === 'xile') {
    thead.innerHTML = '<tr><th>日期</th><th>腎</th><th>胰</th><th>嘔吐</th><th>內容</th><th>剪甲</th></tr>';
    displayData.forEach(r => {
      tbody.innerHTML += `<tr><td>${r[0]}</td><td>${rc(r[1],'check')}</td><td>${rc(r[2],'check')}</td><td>${rc(r[3],'vomit')}</td><td>${r[4]}</td><td>${rc(r[5],'check')}</td></tr>`;
    });
  } else {
    thead.innerHTML = '<tr><th>日期</th><th>咳嗽</th><th>嘔吐</th><th>內容</th><th>剪甲</th></tr>';
    displayData.forEach(r => {
      tbody.innerHTML += `<tr><td>${r[0]}</td><td>${rc(r[1],'cough')}</td><td>${rc(r[2],'vomit')}</td><td>${r[3]}</td><td>${rc(r[4],'check')}</td></tr>`;
    });
  }
  document.getElementById('show-all-btn').style.display = data.length > 10 ? 'block' : 'none';
  document.getElementById('show-all-btn').textContent = showFullHistory ? '收合紀錄 ↑' : '顯示全部紀錄 (' + data.length + ') ↓';
}

function toggleAllRecords() {
  showFullHistory = !showFullHistory;
  renderHistory();
}

async function submitForm() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '同步中...';

  const dateVal = document.getElementById('date-active').value.split('-').slice(1).join('/');
  const note = document.getElementById('note-text').value;
  const isNail = document.getElementById('nail-cut').checked ? "✓" : "";
  const isVaccine = document.getElementById('vaccine').checked ? "TRUE" : "";

  let newEntry = [];
  if (currentCat === 'xile') {
    const vCount = document.getElementById('vomit-count-xile').value;
    const vType = document.getElementById('vomit-type-xile').value;
    const kDrug = document.getElementById('kidney-drug').checked ? "✓" : "";
    const pDrug = document.getElementById('pancreas-drug').checked ? "✓" : "";
    newEntry = [dateVal, kDrug, pDrug, vCount === "0" ? "" : vCount, vType, isNail, isVaccine];
    xileData.unshift(newEntry);
  } else {
    const cCount = document.getElementById('cough-count-ping').value;
    const vCount = document.getElementById('vomit-count-ping').value;
    newEntry = [dateVal, cCount === "0" ? "" : cCount, vCount === "0" ? "" : vCount, "", isNail, isVaccine];
    pingData.unshift(newEntry);
  }

  // 模擬 API 延遲
  await new Promise(r => setTimeout(r, 800));
  
  renderHistory();
  btn.textContent = '✅ 已寫入 Sheets';
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '送出紀錄並同步';
  }, 2000);
}
</script>
</body>
</html>
